<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f8f8;
      color: #111;
    }
    a { text-decoration: none; color: inherit; }

    header {
      background: #111;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo {
      font-size: 1.8em;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      color: #fff;
      font-weight: bold;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .product-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .product-card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 20px;
      width: 280px;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .product-card img {
      width: 100%;
      margin-bottom: 15px;
    }

    button {
      background: #111;
      color: #fff;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #contact {
      background: #111;
      color: #fff;
      padding: 50px 20px;
    }

    footer {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">My Shop</div>
</header>

<section>
  <h2>Valentino Colognes</h2>

  <div class="product-grid">
    <div class="product-card">
      <img src="2568848.avif">
      <h3>Valentino Uomo</h3>
      <p>$120</p>
      <button>Buy Now</button>
    </div>

    <div class="product-card">
      <img src="2568848.avif">
      <h3>Born in Roma</h3>
      <p>$130</p>
      <button>Buy Now</button>
    </div>

    <div class="product-card">
      <img src="2568848.avif">
      <h3>Noir Absolu</h3>
      <p>$140</p>
      <button>Buy Now</button>
    </div>
  </div>
</section>

<section>
  <h2>Hoodies & Sweats</h2>

  <div class="product-grid">
    <div class="product-card">
      <img src="2568848.avif">
      <h3>Gray Hoodie</h3>
      <p>$60</p>
      <button>Buy Now</button>
    </div>

    <div class="product-card">
      <img src="2568848.avif">
      <h3>Black Sweatshirt</h3>
      <p>$55</p>
      <button>Buy Now</button>
    </div>

    <div class="product-card">
      <img src="2568848.avif">
      <h3>White Hoodie</h3>
      <p>$60</p>
      <button>Buy Now</button>
    </div>
  </div>
</section>

<!-- CONTACT -->

  <h2>Contact</h2>

  <p>
    📞 <a href="tel:8318692359">831-869-2359</a>

    </a>
  </p>

  <br>

  <a href="mailto:davidimachuca888@gmail.com">
    <button>Send Email</button>
  </a>
</section>

<footer>
  © 2026 My Shop
</footer>

</body>
</html>
