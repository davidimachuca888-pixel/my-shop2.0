<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>
  <style>
  <img src="2568848.avif"  alt="Product Image" width="250">
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f8f8;
      color: #111;
    }
    a { text-decoration: none; color: inherit; }

    /* Header */
    header {
      background: #111;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo {
      font-size: 1.8em;
      font-weight: bold;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: #fff;
      font-weight: bold;
    }

    /* Sections */
    section {
      padding: 60px 20px;
      text-align: center;
    }
    section h2 {
      font-size: 2em;
      margin-bottom: 40px;
    }

    /* Product Grid */
    .product-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }
    .product-card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 20px;
      width: 280px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .product-card img {
      width: 100%;
      height: auto;
      margin-bottom: 20px;
    }
    .product-card h3 {
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    .product-card p {
      font-size: 1em;
      margin-bottom: 15px;
    }
    .product-card button {
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
      font-weight: bold;
    }
    .product-card button:hover {
      background: #333;
    }

    /* Footer */
    footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    /* Responsive */
    @media(max-width: 900px){
      .product-grid {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">My Shop</div>
    <nav>
      <ul>
        <li><a href="#colognes">Colognes</a></li>
        <li><a href="#essentials">Essentials</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Colognes Section -->
  <section id="colognes">
    <h2>Valentino Colognes</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="https://via.placeholder.com/280x350.png?text=Valentino+Uomo" alt="Valentino Uomo">
        <h3>Valentino Uomo</h3>
        <p>$120.00</p>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_PAYPAL_BUTTON_ID_1">
          <button type="submit">Buy Now</button>
        </form>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/280x350.png?text=Valentino+Born+in+Roma" alt="Valentino Born in Roma">
        <h3>Valentino Born in Roma</h3>
        <p>$130.00</p>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_PAYPAL_BUTTON_ID_2">
          <button type="submit">Buy Now</button>
        </form>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/280x350.png?text=Valentino+Noir+Absolu" alt="Valentino Noir Absolu">
        <h3>Valentino Noir Absolu</h3>
        <p>$140.00</p>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_PAYPAL_BUTTON_ID_3">
          <button type="submit">Buy Now</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Essentials Section -->
  <section id="essentials">
    <h2>Essentials: Sweats & Hoodies</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="https://via.placeholder.com/280x350.png?text=Gray+Hoodie" alt="Gray Hoodie">
        <h3>Gray Hoodie</h3>
        <p>$60.00</p>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_PAYPAL_BUTTON_ID_4">
          <button type="submit">Buy Now</button>
        </form>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/280x350.png?text=Black+Sweatshirt" alt="Black Sweatshirt">
        <h3>Black Sweatshirt</h3>
        <p>$55.00</p>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_PAYPAL_BUTTON_ID_5">
          <button type="submit">Buy Now</button>
        </form>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/280x350.png?text=White+Hoodie" alt="White Hoodie">
        <h3>White Hoodie</h3>
        <p>$60.00</p>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_PAYPAL_BUTTON_ID_6">
          <button type="submit">Buy Now</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer id="contact">
    <p>&copy; 2026 My Shop. All Rights Reserved.</p>
  </footer>

</body>
</html>
